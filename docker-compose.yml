# PhishLens TR - Tek komutla çalıştırma
# Kullanım: docker compose up -d
# API anahtarları için: cp .env.example .env && docker compose up -d

services:
  phishlens:
    build: .
    container_name: phishlens-tr
    ports:
      - "8501:8501"
    volumes:
      - phishlens_data:/app/data
    env_file:
      - .env
    environment:
      - PHISHLENS_DB_PATH=/app/data/history.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  phishlens_data:
